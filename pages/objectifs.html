<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Objectifs — Klan Nostrad</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div id="shell"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/app.js"></script>
<script>
let SESSION;

async function getActiveWeek() {
  const snap = await db.ref("semaines").once("value");
  const list = entries(snap.val()).map(([id, s]) => ({ id, ...s }));
  list.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
  return list.find(s => s.bloquee !== true) || list[0] || null;
}

function barre(pct, color) {
  return `<div style="background:var(--bg-2); border-radius:6px; height:10px; overflow:hidden; flex:1;">
    <div style="height:100%; width:${Math.min(100, pct)}%; background:${color};"></div></div>`;
}

function renderContent() {
  document.getElementById("content").innerHTML = `
    <h1>Objectifs</h1>
    <div class="sigil-rule"></div>

    <div class="panel mt16">
      <div class="panel-head"><h2>Objectif collectif (gains $ — semaine active)</h2></div>
      <div class="row" style="align-items:center;">
        ${SESSION.role === 'admin' ? '<input type="number" id="cibleCollective" style="max-width:160px" placeholder="Cible $">' : ''}
        <div id="barreCollective" style="display:flex; align-items:center; gap:10px; flex:1;"></div>
      </div>
      ${SESSION.role === 'admin' ? '<button class="btn btn-primary mt16" onclick="majCibleCollective()">Enregistrer la cible</button>' : ''}
    </div>

    <div class="panel">
      <div class="panel-head"><h2>Objectifs personnels (actions — semaine active)</h2></div>
      <table><thead><tr><th>Membre</th><th>Cible</th><th>Réalisé</th><th>Progression</th>${SESSION.role === 'admin' ? '<th></th>' : ''}</tr></thead>
        <tbody id="tblObjMembres"><tr class="empty-row"><td colspan="5">Chargement…</td></tr></tbody></table>
    </div>
  `;
}

let WEEK = null, CIBLE_COLLECTIVE = 0;
async function chargerObjectifs() {
  WEEK = await getActiveWeek();
  const [snapM, snapA, snapCfg, snapOM] = await Promise.all([
    db.ref("membres").once("value"),
    WEEK ? db.ref("actions/" + WEEK.id).once("value") : Promise.resolve({ val: () => null }),
    db.ref("objectifs_config").once("value"),
    db.ref("objectifs_membres").once("value")
  ]);
  const membres = entries(snapM.val()).map(([id, m]) => ({ id, ...m })).filter(m => m.actif !== false);
  const actions = entries(snapA.val()).map(([id, a]) => a);
  const cfg = snapCfg.val() || {};
  CIBLE_COLLECTIVE = Number(Object.values(cfg)[0]?.cible) || 0;
  const objCfgId = Object.keys(cfg)[0] || null;
  window._objCfgId = objCfgId;

  const gainsTotal = actions.reduce((acc, a) => acc + Number(a.gains_totaux || 0), 0);
  const pctCollectif = CIBLE_COLLECTIVE > 0 ? Math.round(gainsTotal / CIBLE_COLLECTIVE * 100) : 0;
  document.getElementById("barreCollective").innerHTML = barre(pctCollectif, pctCollectif >= 100 ? 'var(--success)' : 'var(--gold)') +
    `<span class="small muted" style="white-space:nowrap;">${formatMoney(gainsTotal)} / ${formatMoney(CIBLE_COLLECTIVE)}</span>`;
  if (document.getElementById("cibleCollective")) document.getElementById("cibleCollective").value = CIBLE_COLLECTIVE;

  const objMembres = snapOM.val() || {};
  document.getElementById("tblObjMembres").innerHTML = membres.length ? membres.map(m => {
    const objData = objMembres[m.id] || {};
    const objId = Object.keys(objData)[0];
    const cible = objId ? Number(objData[objId].cible) || 0 : 0;
    const fait = actions.filter(a => a.membre_id === m.id && a.resultat === "Réussite").reduce((acc, a) => acc + Number(a.quantite || 0), 0);
    const pct = cible > 0 ? Math.round(fait / cible * 100) : 0;
    return `<tr><td>${m.prenom}</td>
      <td>${SESSION.role === 'admin' ? `<input type="number" value="${cible}" style="max-width:90px" onchange="majObjMembre('${m.id}','${objId || ''}', this.value)">` : cible}</td>
      <td>${fait}</td>
      <td style="display:flex; align-items:center; gap:8px;">${barre(pct, pct >= 100 ? 'var(--success)' : 'var(--steel)')}<span class="small muted">${pct}%</span></td>
      ${SESSION.role === 'admin' ? '<td></td>' : ''}
    </tr>`;
  }).join("") : '<tr class="empty-row"><td colspan="5">Aucun membre</td></tr>';
}

async function majCibleCollective() {
  const val = Number(document.getElementById("cibleCollective").value) || 0;
  const id = window._objCfgId || uid();
  await db.ref("objectifs_config/" + id).set({ cible: val });
  toast("Cible collective enregistrée.");
  chargerObjectifs();
}
async function majObjMembre(membreId, objId, val) {
  const id = objId || uid();
  await db.ref("objectifs_membres/" + membreId + "/" + id).set({ cible: Number(val) || 0 });
  toast("Objectif mis à jour.");
  chargerObjectifs();
}

(async function () {
  SESSION = await initShell("objectifs", "Objectifs");
  if (!SESSION) return;
  renderContent();
  await chargerObjectifs();
})();
</script>
</body>
</html>
