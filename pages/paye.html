<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paye — Klan Nostrad</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div id="shell"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/app.js"></script>
<script>
let SESSION, SEMAINES = [], SEMAINE_SEL = null, TAUX_DROGUE = 20, TAUX_AUTRES = 45, TAUX_BLANCHIMENT = 35;

function renderContent() {
  document.getElementById("content").innerHTML = `
    <h1>Paye</h1>
    <div class="sigil-rule"></div>
    <p class="muted small">Montant suggéré = (gains Vente de Drogue × ${TAUX_DROGUE}%) + (gains action × ${TAUX_AUTRES}%). En "Propre", -${TAUX_BLANCHIMENT}% de blanchiment est appliqué automatiquement. Taux modifiables dans Admin → Config.</p>

    <div class="panel mt16">
      <div class="row" style="align-items:flex-end;">
        <div><label class="l">Semaine</label><select id="selSemaine" onchange="onSemaineChange()"></select></div>
        <div><div class="small muted">Solde propre disponible</div><div class="stat-num gold" id="soldePropreDisp" style="font-size:20px;">0 $</div></div>
        <div><div class="small muted">Total payé cette semaine</div><div class="stat-num" id="totalPayeDisp" style="font-size:20px;">0 $</div></div>
      </div>
    </div>

    <div class="panel">
      <table>
        <thead><tr><th>Membre</th><th>Gains Drogue</th><th>Gains action</th><th>Total généré</th><th>Montant à payer</th><th>Argent</th><th></th></tr></thead>
        <tbody id="tblPaye"><tr class="empty-row"><td colspan="7">Chargement…</td></tr></tbody></table>
    </div>
  `;
}

async function chargerSemaines() {
  const snap = await db.ref("semaines").once("value");
  SEMAINES = entries(snap.val()).map(([id, s]) => ({ id, ...s })).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
  const sel = document.getElementById("selSemaine");
  sel.innerHTML = SEMAINES.map(s => `<option value="${s.id}">${s.nom}${s.bloquee ? " (bloquée)" : " (active)"}</option>`).join("");
  SEMAINE_SEL = SEMAINES.find(s => s.bloquee) || SEMAINES[0] || null;
  if (SEMAINE_SEL) sel.value = SEMAINE_SEL.id;
}

function onSemaineChange() {
  const id = document.getElementById("selSemaine").value;
  SEMAINE_SEL = SEMAINES.find(s => s.id === id);
  chargerPaye();
}

async function chargerPaye() {
  if (!SEMAINE_SEL) { document.getElementById("tblPaye").innerHTML = '<tr class="empty-row"><td colspan="7">Aucune semaine</td></tr>'; return; }
  const isAdmin = SESSION.role === "admin";
  const debut = SEMAINE_SEL.createdAt || 0;
  const fin = SEMAINE_SEL.closedAt || Date.now();

  const [snapM, snapA, snapAD, snapP, snapSale, snapPropre, snapG, snapEv] = await Promise.all([
    db.ref("membres").once("value"),
    db.ref("actions/" + SEMAINE_SEL.id).once("value"),
    db.ref("actions_dispo").once("value"),
    db.ref("payes/" + SEMAINE_SEL.id).once("value"),
    db.ref("argent/sale").once("value"),
    db.ref("argent/propre").once("value"),
    db.ref("visibilite_grades").once("value"),
    db.ref("events_drogue").once("value")
  ]);
  const visi = snapG.val() || {};
  const gradesMasques = new Set(Object.keys(visi).filter(g => visi[g] && visi[g].paye === false));
  const membres = entries(snapM.val()).map(([id, m]) => ({ id, ...m })).filter(m => m.actif !== false && !gradesMasques.has(m.grade));
  const actions = entries(snapA.val()).map(([id, a]) => a);
  const actionsDispo = snapAD.val() || {};
  const payes = snapP.val() || {};
  const events = entries(snapEv.val()).map(([id, e]) => e);

  function tauxDrogueForAction(a) {
    const ts = a.createdAt || 0;
    const ev = events.find(e => ts >= e.debut && ts <= e.fin);
    return ev && ev.taux ? ev.taux : TAUX_DROGUE;
  }
  function tauxActionsForAction(a) {
    const ts = a.createdAt || 0;
    const ev = events.find(e => ts >= e.debut && ts <= e.fin);
    return ev && ev.taux_actions ? ev.taux_actions : TAUX_AUTRES;
  }

  const calcSolde = v => entries(v).reduce((acc, [, l]) => acc + (l.type === "Sortie" ? -Number(l.montant || 0) : Number(l.montant || 0)), 0);
  document.getElementById("soldePropreDisp").textContent = formatMoney(calcSolde(snapPropre.val()));

  function partGains(membreId, a) {
    const totalPersonnes = 1 + (a.participants_ids ? a.participants_ids.length : 0);
    return Number(a.gains_totaux || 0) / totalPersonnes;
  }

  let totalPaye = 0;
  document.getElementById("tblPaye").innerHTML = membres.length ? membres.map(m => {
    const mesActions = actions.filter(a => a.resultat === "Réussite" && (a.membre_id === m.id || (a.participants_ids && a.participants_ids.includes(m.id))));
    const actionsDrogue = mesActions.filter(a => actionsDispo[a.action_id] && actionsDispo[a.action_id].cat_variable);
    const gainsDrogue = Math.round(actionsDrogue.reduce((acc, a) => acc + partGains(m.id, a), 0));
    const gainsAction = Math.round(mesActions.filter(a => !(actionsDispo[a.action_id] && actionsDispo[a.action_id].cat_variable))
      .reduce((acc, a) => acc + partGains(m.id, a), 0));
    const totalGenere = gainsDrogue + gainsAction;
    const dejaPaye = payes[m.id];
    const payeDrogue = actionsDrogue.reduce((acc, a) => acc + Math.round(partGains(m.id, a) * tauxDrogueForAction(a) / 100), 0);
    const payeActions = mesActions.filter(a => !(actionsDispo[a.action_id] && actionsDispo[a.action_id].cat_variable))
      .reduce((acc, a) => acc + Math.round(partGains(m.id, a) * tauxActionsForAction(a) / 100), 0);
    const suggestion = payeDrogue + payeActions;
    const montant = dejaPaye ? Number(dejaPaye.montant) || 0 : suggestion;
    if (dejaPaye) totalPaye += Number(dejaPaye.montant) || 0;

    return `<tr>
      <td>${m.prenom} ${m.nom || ""}</td>
      <td>${formatMoney(gainsDrogue)}</td>
      <td>${formatMoney(gainsAction)}</td>
      <td class="mono">${formatMoney(totalGenere)}</td>
      <td id="montantCell_${m.id}">${formatMoney(montant)}</td>
      <td>${isAdmin && !dejaPaye ? `<select id="typeArgent_${m.id}" onchange="onArgentChange('${m.id}', ${montant})"><option value="sale" selected>Sale</option><option value="propre">Propre (-${TAUX_BLANCHIMENT}%)</option></select>` : "-"}</td>
      <td>${dejaPaye ? '<span class="badge badge-ok">Payé</span>' : (isAdmin ? `<span class="btn btn-sm btn-gold" onclick="payer('${m.id}','${m.prenom}',${montant})">Payer</span>` : '<span class="badge badge-warn">En attente</span>')}</td>
    </tr>`;
  }).join("") : '<tr class="empty-row"><td colspan="7">Aucun membre</td></tr>';

  document.getElementById("totalPayeDisp").textContent = formatMoney(totalPaye);
}

function onArgentChange(membreId, montantBase) {
  const typeArgent = document.getElementById("typeArgent_" + membreId).value;
  const montantAffiche = typeArgent === "propre" ? Math.round(montantBase * (1 - TAUX_BLANCHIMENT / 100)) : montantBase;
  document.getElementById("montantCell_" + membreId).textContent = formatMoney(montantAffiche);
}

async function payer(membreId, prenom, montantBase) {
  if (montantBase < 0) { toast("Montant invalide.", true); return; }
  const typeArgent = document.getElementById("typeArgent_" + membreId).value;
  const montant = typeArgent === "propre" ? Math.round(montantBase * (1 - TAUX_BLANCHIMENT / 100)) : montantBase;
  if (!confirm(`Confirmer le paiement de ${formatMoney(montant)} (argent ${typeArgent}${typeArgent === "propre" ? `, -${TAUX_BLANCHIMENT}% de blanchiment déjà appliqué` : ""}) à ${prenom} ?`)) return;

  await db.ref(`payes/${SEMAINE_SEL.id}/${membreId}`).set({
    montant, type_argent: typeArgent, date: todayISO(), par: SESSION.prenom, createdAt: Date.now()
  });
  if (montant > 0) {
    await db.ref(`argent/${typeArgent}/` + uid()).set({
      date: todayISO(), description: "Paye — " + prenom + " (" + SEMAINE_SEL.nom + ")",
      type: "Sortie", montant, responsable: SESSION.prenom, createdAt: Date.now()
    });
  }

  toast("Paiement enregistré.");
  chargerPaye();
}

(async function () {
  SESSION = await initShell("paye", "Paye");
  if (!SESSION) return;
  const snapCfg = await db.ref("config").once("value");
  const cfg = snapCfg.val() || {};
  TAUX_DROGUE = cfg.taux_paye_drogue ?? 20;
  TAUX_AUTRES = cfg.taux_paye_autres ?? 45;
  TAUX_BLANCHIMENT = cfg.blanchiment_taux ?? 35;
  renderContent();
  await chargerSemaines();
  await chargerPaye();
})();
</script>
</body>
</html>
